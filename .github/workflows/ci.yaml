name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: {}

jobs:
  lint-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PNPM
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run lint checks
        run: pnpm lint

  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PNPM
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format:check
